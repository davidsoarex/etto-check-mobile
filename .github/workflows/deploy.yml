name: Deploy SPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build e publicar E•Check na VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build produção
        run: npm run build

      - name: Configurar SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          ssh-keyscan -H "${SERVER_IP}" >> ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=15 "root@${SERVER_IP}" "echo SSH OK"

      - name: Enviar script de deploy para o servidor
        run: |
          ssh root@${{ secrets.SERVER_IP }} "mkdir -p /root/salgadetto-manager"
          scp -q scripts/remote-deploy-mobile-web.sh \
            root@${{ secrets.SERVER_IP }}:/root/salgadetto-manager/remote-deploy-mobile-web.sh

      - name: Publicar dist na VPS
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          APP: check
        run: |
          set -euo pipefail
          REMOTE_STAGING="/tmp/etto-${APP}-dist-${{ github.sha }}"
          rsync -az --delete dist/ "root@${SERVER_IP}:${REMOTE_STAGING}/"
          ssh "root@${SERVER_IP}" \
            "bash /root/salgadetto-manager/remote-deploy-mobile-web.sh '${APP}' '${REMOTE_STAGING}' && rm -rf '${REMOTE_STAGING}'"

      - name: Verificar site público
        run: |
          set -euo pipefail
          for i in $(seq 1 15); do
            BODY="$(curl -fsS "https://check.salgadetto.com.br/" || true)"
            if echo "$BODY" | grep -qi '<div id="root">'; then
              echo "OK: E•Check online"
              exit 0
            fi
            echo "Tentativa $i: aguardando HTML do SPA…"
            sleep 4
          done
          echo "ERRO: check não respondeu com o SPA"
          exit 1
